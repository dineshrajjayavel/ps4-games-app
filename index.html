<!DOCTYPE html>
<html>
<head>
  <title>PS4 Games Store</title>

  <style>
    img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  background: #222;
}
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #161b22;
    }

    input {
      width: 90%;
      margin: 15px auto;
      display: block;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .banner {
      height: 200px;
      background: linear-gradient(to right, #1f6feb, #9333ea);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #161b22;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0,0,0,0.6);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card p {
      padding: 10px;
      font-size: 14px;
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: #161b22;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
    }

    .modal img {
      width: 100%;
      border-radius: 10px;
    }

    .close {
      margin-top: 10px;
      padding: 10px;
      background: #1f6feb;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>🎮 PS4 Games Store</header>

<div class="banner">
  Explore 6000+ Games
</div>

<input type="text" id="search" placeholder="Search games...">

<div class="grid" id="grid"></div>
  <div style="text-align:center; margin:20px;">
  <button onclick="prevPage()">⬅ Prev</button>
  <span id="page-info"></span>
  <button onclick="nextPage()">Next ➡</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <img id="modal-img">
    <h3 id="modal-title"></h3>
    <button class="close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
let allGames = [];
let currentPage = 1;
const perPage = 100;

async function loadCSV() {
  const res = await fetch('games.csv'); // make sure name is correct
  const text = await res.text();
  const rows = text.split('\n').slice(1);

  allGames = rows.map(row => {
    const cols = row.split(',');
    return {
      name: cols[1],
      img: cols[2]
    };
  });

  renderPage();
}

function renderPage() {
  const grid = document.getElementById('grid');
  grid.innerHTML = "";

  const start = (currentPage - 1) * perPage;
  const end = start + perPage;

  const pageItems = allGames.slice(start, end);

  pageItems.forEach(game => {
    if (!game.name) return;

    const imageUrl = game.img && game.img.startsWith("http")
      ? game.img
      : "https://via.placeholder.com/300x400?text=No+Image";

    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <img src="${imageUrl}" loading="lazy">
      <p>${game.name}</p>
    `;

    card.onclick = () => openModal(game.name, imageUrl);

    grid.appendChild(card);
  });

  document.getElementById('page-info').innerText =
    `Page ${currentPage} of ${Math.ceil(allGames.length / perPage)}`;
}

function nextPage() {
  if (currentPage * perPage < allGames.length) {
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    renderPage();
  }
}

function openModal(name, img) {
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('modal-title').innerText = name;
  document.getElementById('modal-img').src = img;
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

document.getElementById('search').addEventListener('input', function() {
  const value = this.value.toLowerCase();

  allGames = allGames.filter(game =>
    game.name && game.name.toLowerCase().includes(value)
  );

  currentPage = 1;
  renderPage();
});

loadCSV();
</script>
</body>
</html>
