<!DOCTYPE html>
<html>
<head>
  <title>PS4 Games</title>
  <style>
    body { font-family: Arial; background: #111; color: white; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 15px; padding: 20px; }
    .card { background: #222; padding: 10px; border-radius: 10px; text-align: center; }
    img { width: 100%; border-radius: 8px; }
    input { width: 90%; padding: 10px; margin: 20px; font-size: 16px; }
  </style>
</head>
<body>

<h2 style="text-align:center;">PS4 Games</h2>
<input type="text" id="search" placeholder="Search games...">

<div class="grid" id="grid"></div>

<script>
async function loadCSV() {
  const res = await fetch('ps4 games list - Sheet1.csv'); // change name
  const text = await res.text();
  const rows = text.split('\n').slice(1);

  const grid = document.getElementById('grid');

  rows.forEach(row => {
    const cols = row.split(',');
    const name = cols[1];
    const img = cols[2];

    if (!name) return;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="${img}"><p>${name}</p>`;
    grid.appendChild(card);
  });
}

loadCSV();

document.getElementById('search').addEventListener('input', function() {
  const value = this.value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(value) ? '' : 'none';
  });
});
</script>

</body>
</html>
