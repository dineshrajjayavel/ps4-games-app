<!DOCTYPE html>
<html>
<head>
  <title>PS4 Games Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 24px;
      background: #161b22;
    }

    .banner {
      height: 200px;
      background: linear-gradient(to right, #1f6feb, #9333ea);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    input {
      width: 90%;
      margin: 15px auto;
      display: block;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #161b22;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #222;
    }

    .card p {
      padding: 10px;
      font-size: 14px;
    }

    .pagination {
      text-align: center;
      margin: 20px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🎮 PS4 Games Store</header>

<div class="banner">Explore 6000+ Games</div>

<input type="text" id="search" placeholder="Search games...">

<div class="grid" id="grid"></div>

<div class="pagination">
  <button onclick="prevPage()">⬅ Prev</button>
  <span id="page-info"></span>
  <button onclick="nextPage()">Next ➡</button>
</div>

<script>
let allGames = [];
let filteredGames = [];
let currentPage = 1;
const perPage = 100;

// CSV parser (handles commas correctly)
function parseCSV(text) {
  const rows = [];
  let row = [];
  let current = '';
  let insideQuotes = false;

  for (let char of text) {
    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      row.push(current);
      current = '';
    } else if (char === '\n' && !insideQuotes) {
      row.push(current);
      rows.push(row);
      row = [];
      current = '';
    } else {
      current += char;
    }
  }

  if (current) row.push(current);
  if (row.length) rows.push(row);

  return rows;
}

async function loadCSV() {
  const res = await fetch('games.csv');
  const text = await res.text();

  const data = parseCSV(text).slice(1);

  allGames = data.map(cols => ({
    name: cols[1],
    img: cols[2]
  }));

  filteredGames = [...allGames];
  renderPage();
}

function renderPage() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const start = (currentPage - 1) * perPage;
  const pageItems = filteredGames.slice(start, start + perPage);

  pageItems.forEach(game => {
    if (!game.name) return;

    const imageUrl = game.img && game.img.startsWith("http")
      ? game.img
      : "https://via.placeholder.com/300x400?text=No+Image";

    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <img src="${imageUrl}" loading="lazy">
      <p>${game.name}</p>
    `;

    grid.appendChild(card);
  });

  document.getElementById('page-info').innerText =
    `Page ${currentPage} of ${Math.ceil(filteredGames.length / perPage)}`;
}

function nextPage() {
  if (currentPage * perPage < filteredGames.length) {
    currentPage++;
    renderPage();
  }
}

function prevPage() {
  if (currentPage > 1) {
    currentPage--;
    renderPage();
  }
}

// SEARCH (fixed)
document.getElementById('search').addEventListener('input', function() {
  const value = this.value.toLowerCase();

  filteredGames = allGames.filter(game =>
    game.name && game.name.toLowerCase().includes(value)
  );

  currentPage = 1;
  renderPage();
});

loadCSV();
</script>

</body>
</html>
